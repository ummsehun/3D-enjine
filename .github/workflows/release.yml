name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: terminal-miku3d-macos-arm64
            binary: terminal-miku3d

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: terminal-miku3d-windows-x64
            binary: terminal-miku3d.exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: terminal-miku3d-linux-x64
            binary: terminal-miku3d

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux audio dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --features gpu

      - name: Create release package
        shell: bash
        run: |
          PKG_DIR="${{ matrix.artifact_name }}"
          mkdir -p "$PKG_DIR"/assets/{glb,stage,pmx,vmd,camera,music,sync}
          mkdir -p "$PKG_DIR/bin"

          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$PKG_DIR/bin/"

          if [ "${{ matrix.os }}" != "windows-latest" ]; then
            chmod +x "$PKG_DIR/bin/${{ matrix.binary }}"
          fi

          cp Gascii.config "$PKG_DIR/" 2>/dev/null || true

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp scripts/launcher/start.bat "$PKG_DIR/"
          else
            cp scripts/launcher/start.sh "$PKG_DIR/"
            chmod +x "$PKG_DIR/start.sh"
          fi

      - name: Package archive
        shell: bash
        run: |
          PKG_DIR="${{ matrix.artifact_name }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "${{ matrix.artifact_name }}.zip" "$PKG_DIR/"
          else
            tar -czf "${{ matrix.artifact_name }}.tar.gz" "$PKG_DIR/"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.zip
            ${{ matrix.artifact_name }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            */*.zip
            */*.tar.gz
          generate_release_notes: true
